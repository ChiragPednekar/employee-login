<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Offline — WorkLog</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; background: #f1f5f9; color: #0f172a;
         display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .card { text-align: center; padding: 2rem; }
  .icon { width: 64px; height: 64px; border-radius: 16px; background: #4f46e5; color: #fff;
          font-size: 2rem; line-height: 64px; margin: 0 auto 1rem; }
  h1 { font-size: 1.25rem; margin: 0 0 .5rem; }
  p { color: #64748b; font-size: .9rem; margin: 0 0 1.5rem; }
  button { background: #4f46e5; color: #fff; border: 0; border-radius: 12px;
           padding: .75rem 2rem; font-size: 1rem; font-weight: 600; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">⏱</div>
    <h1>You're offline</h1>
    <p>WorkLog needs an internet connection to verify your location<br />and record attendance.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
